<!doctype html>
<html lang="cs">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA 6 – Game Demo</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

        body {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle at top, #222, #000);
            color: white;
            text-align: center;
        }

        h1 {
            margin: 20px 0;
            letter-spacing: 3px;
        }

        #selection {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .player-card {
            background: #111;
            border: 2px solid #444;
            border-radius: 15px;
            padding: 15px;
            width: 230px;
        }

        .player-card img {
            width: 200px;
            border-radius: 10px;
        }

        button {
            background: linear-gradient(145deg, #ff9800, #e65100);
            border: none;
            font-size: 20px;
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
        }

        #Start {
            background: linear-gradient(145deg, #00e676, #00c853);
        }

        #game {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        canvas {
            border: 4px solid #ff9800;
            background: #0f0f0f;
            border-radius: 12px;
        }

        #gameOver {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 64px;
            color: red;
        }

        #gameOver button {
            margin-top: 30px;
            font-size: 26px;
        }

        #p2,
        #p3,
        #p4,
        #p5,
        #refere {
            display: none;
        }
    </style>
</head>

<body>

    <h1>GTA 6 – GAME DEMO</h1>

    <img id="refere" src="rozhodci.jpeg">

    <div id="selection">
        <button id="doleva">⬅️</button>

        <div id="p1" class="player-card"><img id="o1" src="diego-maradona-playing-for-argentina-in-1986.jpeg"></div>
        <div id="p2" class="player-card"><img id="o2" src="Paolo-Maldini-585x775.jpeg"></div>
        <div id="p3" class="player-card"><img id="o3" src="603_neymar (1).jpeg"></div>
        <div id="p4" class="player-card"><img id="o4" src="federico.jpeg"></div>
        <div id="p5" class="player-card"><img id="o5" src="Zidane_Zizu.jpeg"></div>

        <button id="doprava">➡️</button>
    </div>

    <button id="Start">START GAME</button>

    <div id="game">
        <canvas id="myCanvas" width="999" height="354"></canvas>
    </div>

    <div id="gameOver">
        GAME OVER
        <button onclick="location.reload()">HRÁT ZNOVU</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
        /* === VÝBĚR POSTAVY === */
        let postava = 1, img;

        $("#doleva").click(() => change(-1));
        $("#doprava").click(() => change(1));

        function change(d) {
            $("#p" + postava).hide();
            postava += d;
            if (postava < 1) postava = 5;
            if (postava > 5) postava = 1;
            $("#p" + postava).show();
        }

        $("#Start").click(() => {
            $("#selection,#Start").fadeOut();
            img = document.getElementById("o" + postava);
            startTimer();
            update();
        });

        /* === CANVAS === */
        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");
        const rozhodci = document.getElementById("refere");

        /* === HRÁČ === */
        let x = 50, y = 50, w = 25, h = 25;
        let speed = 6;
        let step = 0;
        let direction = "down";

        /* === CÍL === */
        let tx, ty, tw = 50, th = 40;
        let score = 0;

        /* === ČAS === */
        let timeLeft = 15;
        let timer;

        /* === OVLÁDÁNÍ === */
        const keys = {};
        document.addEventListener("keydown", e => keys[e.key] = true);
        document.addEventListener("keyup", e => keys[e.key] = false);

        function randomTarget() {
            tx = Math.random() * (canvas.width - tw);
            ty = Math.random() * (canvas.height - th);
        }
        randomTarget();

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    if (score < 5) {
                        document.getElementById("gameOver").style.display = "flex";
                        clearInterval(timer);
                    } else {
                        timeLeft = 15;
                        score = 0;
                    }
                }
            }, 1000);
        }

        function collide() {
            return x < tx + tw && x + w > tx && y < ty + th && y + h > ty;
        }

        /* === REALISTICKÉ NOHY === */
        function drawLeg(side) {
            let hipX = x + w * (side === "left" ? 0.35 : 0.65);
            let hipY = y + h;

            let thigh = h * 0.35;
            let calf = h * 0.35;

            let phase = step + (side === "left" ? 0 : Math.PI);
            let a1 = Math.sin(phase) * 0.6;
            let a2 = Math.sin(phase + 0.8) * 0.8;

            let kneeX = hipX + Math.sin(a1) * thigh;
            let kneeY = hipY + Math.cos(a1) * thigh;

            let footX = kneeX + Math.sin(a1 + a2) * calf;
            let footY = kneeY + Math.cos(a1 + a2) * calf;

            // kalhoty
            ctx.strokeStyle = "#1e88e5";
            ctx.lineWidth = w * 0.18;
            ctx.lineCap = "round";

            ctx.beginPath();
            ctx.moveTo(hipX, hipY);
            ctx.lineTo(kneeX, kneeY);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(kneeX, kneeY);
            ctx.lineTo(footX, footY);
            ctx.stroke();

            // logo na kalhotách
            ctx.fillStyle = "yellow";
            ctx.beginPath();
            ctx.arc(hipX, hipY + thigh * 0.5, w * 0.08, 0, Math.PI * 2);
            ctx.fill();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawLeg("left");
            drawLeg("right");

            ctx.drawImage(img, x, y, w, h);
            ctx.drawImage(rozhodci, tx, ty, tw, th);

            ctx.fillStyle = "white";
            ctx.font = "18px Orbitron";
            ctx.fillText("Score: " + score + " / 5", 20, 25);
            ctx.fillText("Time: " + timeLeft + " s", 20, 50);
        }

        function update() {
            if (document.getElementById("gameOver").style.display === "flex") return;

            let moving = false;

            if (keys.ArrowUp) { y -= speed; moving = true; }
            if (keys.ArrowDown) { y += speed; moving = true; }
            if (keys.ArrowLeft) { x -= speed; moving = true; }
            if (keys.ArrowRight) { x += speed; moving = true; }

            if (moving) step += 0.25;

            if (x > canvas.width) x = -w;
            if (x + w < 0) x = canvas.width;
            if (y > canvas.height) y = -h;
            if (y + h < 0) y = canvas.height;

            if (collide()) {
                score++;
                randomTarget();
            }

            draw();
            requestAnimationFrame(update);
        }
    </script>

</body>

</html>
