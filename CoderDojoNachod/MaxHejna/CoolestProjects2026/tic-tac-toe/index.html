<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(120deg,
                    #1e1e1e,
                    #2f2f2f,
                    #1e1e1e,
                    #3a3a3a);
            background-size: 400% 400%;
            animation: bgShift 12s ease-in-out infinite;
        }

        @keyframes bgShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        #menu {
            background: white;
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            font-family: Arial;
            text-align: center;
            width: 300px;
            animation: menuShow 0.4s ease-out forwards;
        }

        @keyframes menuShow {
            0% {
                opacity: 0;
                transform: scale(1.2);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        #menu::before {
            content: "";
            position: absolute;
            inset: -3px;
            border-radius: 15px;
            background: linear-gradient(270deg,
                    #ff0000,
                    #00ff00,
                    #0000ff);
            background-size: 400% 400%;
            animation: borderFlow 4s linear infinite;
            z-index: -1;
        }

        #menu::after {
            content: "";
            position: absolute;
            inset: 0;
            background: white;
            border-radius: 12px;
            z-index: -1;
        }

        @keyframes borderFlow {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        #menu h3 {
            margin-bottom: 30px;
            color: #333;
            font-size: 18px;
        }

        #velikost {
            width: 100%;
            cursor: pointer;
        }

        #hodnota {
            display: inline-block;
            margin: 5px 0 20px;
            font-weight: bold;
            font-size: 18px;
            color: #007bff;
        }

        #hrat {
            width: 100%;
            padding: 10px;
            border: 1px #007bff solid;
            border-radius: 8px;
            background-color: transparent;
            color: #007bff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
        }

        #hrat:hover {
            background-color: #007bff;
            color: white;
        }

        #grid {
            display: grid;
            gap: 2px;
            padding: 1px;
        }

        .cell {
            width: 55px;
            height: 55px;
            border-radius: 5px;
            background: rgb(112, 112, 112);
            font-size: 40px;
            cursor: pointer;
            opacity: 0;
            animation: fadeIn 0.4s ease forwards;
            animation-delay: calc(var(--i) * 0.005s);
            transition: all 0.1s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.1);
            }

            to {
                opacity: 1;
                transform: scale(1);

            }
        }

        .cell:not(:empty) {
            background: rgb(178, 178, 178);
            cursor: not-allowed;
        }

        .cell:hover {
            background: rgb(178, 178, 178);
        }

        .cell:active {
            background: rgb(112, 112, 112);
        }
    </style>
</head>

        <input type="button" value="Play" id="hrat">
